<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block %}Apple Inc {%endtitle%}</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    </head>
<body>
    {%block content%}
    <h1>Welcome to the Apple Inc app.</h1>
    <h2>Create a new account or login to your account.</h2>
    <form action="register">
        <label>Name:</label><br>
        <input type="text" name="Firstname" placeholder="Enter your name:" required><br><br>

        <label>Surname:</label>
        <input type="text" name="Surname" placeholder="Enter your surname" required><br><br> 

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter your password" required><br><br>
        <label>Submit:</label>
        <button type="submit">Submit your credentials</button>
    </form>
    {%end content%}
    <a href="/login.html">Login</a>
</body>
</html>
